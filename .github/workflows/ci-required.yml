name: ci-required (mirror-inert)

# GitHub is a public Homebrew tap mirror. LastGit is source of truth for
# CR/CI/merge, and `.lastgit/ci.sh` owns the required `ci-required` gate.

on:
  workflow_dispatch:

jobs:
  inert:
    runs-on: ubuntu-latest
    steps:
      - run: echo "GitHub mirror - no Actions. Use LastGit lastdb:///homebrew-lastdb."
